<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cost Breakdown Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .chart-container { width: 400px; height: 400px; margin: 20px auto; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 4px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Cost Breakdown Fix Test</h1>
        
        <div class="alert alert-success">
            <h5>Fix Applied!</h5>
            <p>This page tests the enhanced cost breakdown analytics that should fix the empty chart issue.</p>
        </div>

        <div class="test-section">
            <h3>🎯 Quick Actions</h3>
            <div class="row mb-3">
                <div class="col-md-4">
                    <button onclick="testCostBreakdown()" class="btn btn-primary w-100">Test Cost Breakdown</button>
                </div>
                <div class="col-md-4">
                    <button onclick="createSampleData()" class="btn btn-success w-100">Create Sample Data</button>
                </div>
                <div class="col-md-4">
                    <button onclick="refreshChart()" class="btn btn-info w-100">Refresh Chart</button>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h3>📊 Cost Breakdown Chart</h3>
            <div class="chart-container">
                <canvas id="testCostChart"></canvas>
            </div>
        </div>

        <div class="test-section">
            <h3>📋 Test Results</h3>
            <div id="testLog" class="log">Ready to test cost breakdown fix...\n</div>
        </div>
    </div>

    <!-- Include all required scripts -->
    <script src="public/assets/js/supabase.js"></script>
    <script src="public/assets/js/dataService.js"></script>
    <script src="public/assets/js/analytics.js"></script>
    <script src="public/assets/js/cost-breakdown-analytics-fix.js"></script>

    <script>
        let testChart = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('testLog');
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            logDiv.textContent += `${timestamp} ${icon} ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function testCostBreakdown() {
            log('🧪 Testing enhanced cost breakdown function...', 'info');
            
            try {
                if (typeof window.getEnhancedCostBreakdownData !== 'function') {
                    log('❌ Enhanced cost breakdown function not available', 'error');
                    return;
                }
                
                const result = await window.getEnhancedCostBreakdownData('month');
                
                if (result && result.labels && result.values) {
                    log(`✅ Got ${result.labels.length} cost categories`, 'success');
                    
                    if (result.labels.length > 0) {
                        result.labels.forEach((label, index) => {
                            log(`   ${label}: ₱${result.values[index] || 0}`, 'info');
                        });
                        
                        // Update chart
                        updateTestChart(result);
                    } else {
                        log('⚠️ No cost data found - try creating sample data first', 'warning');
                    }
                } else {
                    log('❌ Invalid result from cost breakdown function', 'error');
                }
                
            } catch (error) {
                log(`❌ Error testing cost breakdown: ${error.message}`, 'error');
            }
        }
        
        async function createSampleData() {
            log('🛠️ Creating sample cost data...', 'info');
            
            try {
                if (typeof window.createSampleCostData !== 'function') {
                    log('❌ Create sample data function not available', 'error');
                    return;
                }
                
                const success = await window.createSampleCostData();
                
                if (success) {
                    log('✅ Sample cost data created successfully', 'success');
                    log('🔄 Refreshing cost breakdown...', 'info');
                    
                    // Wait a moment then refresh
                    setTimeout(() => {
                        testCostBreakdown();
                    }, 1000);
                } else {
                    log('❌ Failed to create sample data', 'error');
                }
                
            } catch (error) {
                log(`❌ Error creating sample data: ${error.message}`, 'error');
            }
        }
        
        function refreshChart() {
            log('🔄 Refreshing chart...', 'info');
            testCostBreakdown();
        }
        
        function updateTestChart(data) {
            const canvas = document.getElementById('testCostChart');
            
            // Destroy existing chart
            if (testChart) {
                testChart.destroy();
            }
            
            testChart = new Chart(canvas, {
                type: 'pie',
                data: {
                    labels: data.labels,
                    datasets: [{
                        data: data.values,
                        backgroundColor: data.colors || [
                            'rgba(243, 156, 18, 0.8)',
                            'rgba(52, 152, 219, 0.8)',
                            'rgba(46, 204, 113, 0.8)',
                            'rgba(155, 89, 182, 0.8)',
                            'rgba(149, 165, 166, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const dataset = context.dataset;
                                    const total = dataset.data.reduce((sum, value) => sum + value, 0);
                                    const currentValue = dataset.data[context.dataIndex];
                                    const percentage = total > 0 ? ((currentValue / total) * 100).toFixed(1) : 0;
                                    return `${context.label}: ${percentage}% (₱${currentValue.toLocaleString()})`;
                                }
                            }
                        }
                    }
                }
            });
            
            log('✅ Chart updated successfully', 'success');
        }
        
        // Initialize test
        window.addEventListener('load', () => {
            log('🔧 Cost Breakdown Fix Test initialized', 'info');
            
            // Check if fix is loaded
            setTimeout(() => {
                const fixLoaded = window.costBreakdownAnalyticsFix && window.costBreakdownAnalyticsFix.loaded;
                log(`Cost breakdown fix loaded: ${fixLoaded ? '✅ YES' : '❌ NO'}`, fixLoaded ? 'success' : 'error');
                
                if (fixLoaded) {
                    log('💡 Click "Test Cost Breakdown" to see if data loads', 'info');
                    log('💡 If no data, click "Create Sample Data" first', 'info');
                }
            }, 1000);
        });
    </script>
</body>
</html>
